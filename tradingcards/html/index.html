<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trading Cards</title><link rel="stylesheet" href="style.css" /></head><body>
<audio id="sound_r" src="sounds/r.mp3" preload="auto"></audio>
<audio id="sound_sr" src="sounds/sr.mp3" preload="auto"></audio>
<audio id="sound_ssr" src="sounds/ssr.mp3" preload="auto"></audio>
<audio id="sound_ur" src="sounds/ur.mp3" preload="auto"></audio>
<audio id="sound_open" src="sounds/open.mp3" preload="auto"></audio>
<audio id="sound_page" src="sounds/page.mp3" preload="auto"></audio>
<audio id="sound_hover" src="sounds/hover.mp3" preload="auto"></audio>

<div id="overlay" class="hidden">
  <canvas id="particles"></canvas>
  <div class="book-container">
    <div class="nav">
      <span id="collectionInfo" class="collection"></span>
      <div id="rarityFilterBar" class="rarity-filter" aria-label="レアリティフィルタ">
        <button class="rarity-chip active" data-rarity-filter="ALL">ALL</button>
        <button class="rarity-chip rarity-r" data-rarity-filter="R">R</button>
        <button class="rarity-chip rarity-sr" data-rarity-filter="SR">SR</button>
        <button class="rarity-chip rarity-ssr" data-rarity-filter="SSR">SSR</button>
        <button class="rarity-chip rarity-ur" data-rarity-filter="UR">UR</button>
        <span class="filter-divider" aria-hidden="true">|</span>
        <button class="scope-chip" data-collection-toggle="OWNED">Owned</button>
      </div>
      <div class="nav-actions">
        <button id="tradeBtn" class="btn">Trade</button>
        <button id="closeBtn" class="btn subtle">Close</button>
      </div>
    </div>
    <div id="rarityInfo" class="rarity-info"></div>
    <div class="book"><div class="spread" id="spread">
      <div class="page left" id="leftPage"></div><div class="page right" id="rightPage"></div>
    </div></div>
    
    
<div class="pageNav" id="pageNav">
  <button id="prev10" title="Back 10 pages">◀◀</button>
  <button id="prev" title="Prev">◀</button>
  <span id="pageIndicator">Page 1</span>
  <button id="next" title="Next">▶</button>
  <button id="next10" title="Forward 10 pages">▶▶</button>
</div>

<div class="hint" id="hint"></div>
  </div>

  <div id="packLayer" class="hidden packLayer r">
    <div class="packWrap">
      <div class="packBody"><div class="packLabel">CARD PACK</div><div class="packShine"></div></div>
      <div id="packTop" class="packTop"><div class="packTopLabel">SLIDE</div></div>
      <div id="tearGlow" class="tearGlow"></div>
      <div class="packHelp">上側を上へスライドして開封</div>
    </div>
  </div>

  <div id="rewardEffect" class="reward hidden"><div id="rewardCard" class="reward-card"></div></div>

  <div id="tradePanel" class="trade hidden">
    <div class="tradeBox"><div class="tradeHeader"><div id="tradeTitle">トレード</div>
      <button id="tradeClose" class="btn subtle">Close</button></div>
      <div id="tradeBody" class="tradeBody"></div>
    </div>
  </div>
</div>

<div id="adminOverlay" class="hidden">
  <div class="tablet">
    <div class="header"><h2>Card Admin</h2><button id="adminClose">✕</button></div>
    <div class="tabs">
      <button class="tab active" data-tab="list">一覧</button>
      <button class="tab" data-tab="add">追加/編集</button>
      <button class="tab" data-tab="give">配布</button>
      <button class="tab" data-tab="rates">排出率</button>
    </div>
    <div class="content">
      <div id="adminList" class="tabContent active"><div id="cardList"></div></div>
      <div id="adminAdd" class="tabContent">
        <h3 id="formTitle">新規カード追加</h3>
        <input id="card_id" type="hidden">
        <div id="cardIdPreview" class="mono" style="display:none;"></div>
        <div id="placePreview" class="mono" style="margin:0 0 10px; opacity:.75; display:none;"></div>
        <input id="label" placeholder="表示名">
        <select id="rarity"><option>R</option><option>SR</option><option>SSR</option><option>UR</option></select>
        <input id="weight" placeholder="weight" type="number">
        <input id="page" placeholder="page" type="hidden" value="1">
        <input id="slot" placeholder="slot" type="hidden" value="1">
        <input id="image_url" placeholder="画像URL (https://...)">
        <label class="checkRow"><input type="checkbox" id="is_limited"> 限定</label>
        <label class="small">開始（任意）</label><input id="start_date" type="datetime-local">
        <label class="small">終了（任意）</label><input id="end_date" type="datetime-local">
        <div class="row adminFormActions"><button id="saveCardBtn" class="btn">保存</button><button id="resetFormBtn" class="btn subtle">リセット</button><button id="deleteCardBtn" class="btn danger hidden">物理削除</button></div>
      </div>
      <div id="adminGive" class="tabContent">
        <input id="targetId" placeholder="プレイヤーID">
        <input id="amount" placeholder="枚数" type="number" value="1">
        <button id="givePackBtn" class="btn">パック配布</button>
        <button id="giveFinderBtn" class="btn subtle">カードファインダー配布</button>
      </div>
      <div id="adminRates" class="tabContent">
        <div class="rateGrid">
          <label class="rateCard rate-r"><span class="rateLabel">R</span><input id="rarityWeightR" type="number" min="0" step="1" placeholder="weight"><span id="rarityPctR" class="ratePct">約 0%</span></label>
          <label class="rateCard rate-sr"><span class="rateLabel">SR</span><input id="rarityWeightSR" type="number" min="0" step="1" placeholder="weight"><span id="rarityPctSR" class="ratePct">約 0%</span></label>
          <label class="rateCard rate-ssr"><span class="rateLabel">SSR</span><input id="rarityWeightSSR" type="number" min="0" step="1" placeholder="weight"><span id="rarityPctSSR" class="ratePct">約 0%</span></label>
          <label class="rateCard rate-ur"><span class="rateLabel">UR</span><input id="rarityWeightUR" type="number" min="0" step="1" placeholder="weight"><span id="rarityPctUR" class="ratePct">約 0%</span></label>
        </div>
        <div class="rateSummary">合計 weight: <span id="rarityWeightTotal">0</span></div>
        <div class="row"><button id="saveRarityWeightsBtn" class="btn">保存</button></div>
      </div>
    </div>
  </div>
</div>


<div id="deleteConfirmModal" class="confirmModal hidden" aria-hidden="true">
  <div class="confirmModalBackdrop"></div>
  <div class="confirmModalCard">
    <div class="confirmModalTitle">カードを物理削除します</div>
    <div class="confirmModalBody">
      <p>この操作は元に戻せません。</p>
      <p>カード本体に加えて、プレイヤーの所持データも削除されます。</p>
      <div id="deleteTargetCardId" class="confirmTarget mono"></div>
    </div>
    <div class="confirmModalActions">
      <button id="deleteCancelBtn" class="btn subtle">キャンセル</button>
      <button id="deleteConfirmBtn" class="btn danger">削除する</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
    <!-- Card preview modal -->
    <div id="cardPreview" class="cardPreview hidden">
      <div class="cardPreviewBackdrop"></div>
      <div class="cardPreviewPanel">
        <div class="navZone left" id="prevArrow" aria-label="Prev">
          <div class="navArrow">◀</div>
        </div>
        <img id="cardPreviewImg" alt="preview">
        <div class="navZone right" id="nextArrow" aria-label="Next">
          <div class="navArrow">▶</div>
        </div>
      </div>
    </div>


  <div id="tc-toast" class="tc-toast" aria-live="polite"></div>
</body></html>
